<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 마술램프</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #edeae4;
    }

    .chat-container {
      width: 500px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.14);
    }

    /* ── 헤더 ── */
    .chat-header {
      padding: 22px 24px 20px;
      background: #1a1a1a;
      border-bottom: 2px solid #c4a35a;
    }

    .chat-header h1 {
      font-family: 'Cormorant Garamond', 'Noto Sans KR', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #f5f0e6;
      letter-spacing: 1px;
    }

    .chat-header h1 span {
      margin-right: 8px;
    }

    .chat-header p {
      margin-top: 4px;
      font-size: 0.78rem;
      font-weight: 300;
      color: #c4a35a;
      letter-spacing: 0.5px;
    }

    /* ── 대화창 ── */
    #chat-box {
      padding: 24px 20px;
      min-height: 340px;
      max-height: 460px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fff;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb {
      background: #d9d3c8;
      border-radius: 4px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 80%;
      line-height: 1.7;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .message.user {
      background: #1a1a1a;
      color: #f5f0e6;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #f5f2ec;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      background: #fdf0f0;
      color: #8b2222;
      border: 1px solid #f0d0d0;
      align-self: flex-start;
      font-size: 0.85rem;
    }

    .thinking {
      font-size: 0.8rem;
      font-weight: 300;
      color: #a09a90;
      align-self: flex-start;
      padding: 4px 4px;
      font-style: italic;
    }

    /* ── 입력창 ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e8e3db;
      background: #faf8f5;
    }

    #user-input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid #d9d3c8;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      outline: none;
      resize: none;
      height: 44px;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #user-input::placeholder {
      color: #bbb6ae;
      font-weight: 300;
    }

    #user-input:focus {
      border-color: #c4a35a;
      box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.12);
    }

    #send-btn {
      padding: 0 20px;
      height: 44px;
      background: #1a1a1a;
      color: #f5f0e6;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #333; }

    #send-btn:disabled {
      background: #ccc8c0;
      color: #fff;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1><span>🪔</span>AI 마술램프</h1>
      <p>지니가 무엇이든 대답해드립니다.</p>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
      <textarea id="user-input" placeholder="무엇이든 물어보세요, 주인님..." rows="1"></textarea>
      <button id="send-btn">전송</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const MAX_HISTORY = 5;
    let history = [];

    function addMessage(text, type) {
      const el = document.createElement('div');
      el.className = `message ${type}`;
      el.textContent = text;
      chatBox.appendChild(el);
      chatBox.scrollTop = chatBox.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      sendBtn.disabled = true;

      history.push({ role: 'user', content: message });

      const thinking = document.createElement('div');
      thinking.className = 'thinking';
      thinking.textContent = '생각하는 중...';
      chatBox.appendChild(thinking);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        thinking.remove();
        if (data.reply) {
          addMessage(data.reply, 'bot');
          history.push({ role: 'assistant', content: data.reply });
          if (history.length > MAX_HISTORY * 2) {
            history = history.slice(history.length - MAX_HISTORY * 2);
          }
        } else {
          history.pop();
          addMessage(data.error || '오류가 발생했습니다.', 'error');
        }
      } catch {
        history.pop();
        thinking.remove();
        addMessage('서버에 연결할 수 없습니다.', 'error');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
